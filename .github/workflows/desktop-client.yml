name: Desktop client packages

on:
  workflow_dispatch:
  push:
    branches:
      - DEV
    tags:
      - "v*"
    paths:
      - ".github/workflows/desktop-client.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "clients/streamserver-desktop/**"
  pull_request:
    branches:
      - DEV
    paths:
      - ".github/workflows/desktop-client.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "clients/streamserver-desktop/**"

permissions:
  contents: write

concurrency:
  group: desktop-client-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.target }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            target: windows
            arch: x64
          - os: ubuntu-24.04
            target: linux
            arch: x64
          - os: macos-15
            target: macos
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            libgtk-3-dev \
            liblzma-dev \
            libmpv-dev \
            libsecret-1-dev \
            ninja-build \
            pkg-config

      - name: Set up Rust
        run: |
          rustup toolchain install 1.85.0 --profile minimal
          rustup default 1.85.0
          rustc --version

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"
          channel: stable
          cache: true

      - name: Enable Flutter desktop target
        run: flutter config --enable-${{ matrix.target }}-desktop

      - name: Disable Flutter Swift Package Manager for macOS plugins
        if: runner.os == 'macOS'
        run: flutter config --no-enable-swift-package-manager

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Rust native tests
        run: cargo test -p streamserver-desktop

      - name: Flutter checks
        working-directory: clients/streamserver-desktop
        run: |
          flutter pub get
          flutter analyze
          flutter test

      - name: Build Windows offline package
        if: runner.os == 'Windows'
        working-directory: clients/streamserver-desktop
        shell: pwsh
        run: .\scripts\package_offline.ps1 -TargetPlatform windows

      - name: Build Windows installer
        if: runner.os == 'Windows'
        working-directory: clients/streamserver-desktop
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $version = (Select-String -Path pubspec.yaml -Pattern '^version:\s*(\S+)' | ForEach-Object { $_.Matches[0].Groups[1].Value })
          $safeVersion = $version.Replace('+', '-')
          $releaseDir = Resolve-Path 'build\windows\x64\runner\Release'
          $distDir = Resolve-Path 'dist'
          $setupBaseName = "streamserver-desktop-windows-x64-setup-$safeVersion"
          $issPath = Join-Path $env:TEMP 'streamserver-desktop.iss'
          $iss = @"
          [Setup]
          AppId={{D5F47302-D31B-4D19-B0DE-19AE0C13D2B8}
          AppName=StreamServer控制台
          AppVersion=$version
          AppPublisher=StreamServer
          DefaultDirName={autopf}\StreamServer控制台
          DefaultGroupName=StreamServer控制台
          OutputDir=$distDir
          OutputBaseFilename=$setupBaseName
          Compression=lzma2
          SolidCompression=yes
          ArchitecturesAllowed=x64compatible
          ArchitecturesInstallIn64BitMode=x64compatible

          [Tasks]
          Name: "desktopicon"; Description: "Create a desktop shortcut"; GroupDescription: "Additional icons:"; Flags: unchecked

          [Files]
          Source: "$releaseDir\*"; DestDir: "{app}"; Flags: recursesubdirs ignoreversion

          [Icons]
          Name: "{group}\StreamServer控制台"; Filename: "{app}\streamserver_desktop.exe"
          Name: "{autodesktop}\StreamServer控制台"; Filename: "{app}\streamserver_desktop.exe"; Tasks: desktopicon

          [Run]
          Filename: "{app}\streamserver_desktop.exe"; Description: "Launch StreamServer控制台"; Flags: nowait postinstall skipifsilent
          "@
          Set-Content -LiteralPath $issPath -Value $iss -Encoding utf8BOM
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc $issPath
          if ($LASTEXITCODE -ne 0) {
            throw "Inno Setup failed with exit code $LASTEXITCODE"
          }
          $setupPath = Join-Path $distDir "$setupBaseName.exe"
          $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $setupPath
          Add-Content -LiteralPath (Join-Path $distDir 'SHA256SUMS') -Value "$($hash.Hash.ToLowerInvariant())  $(Split-Path -Leaf $setupPath)"

      - name: Build macOS offline package
        if: runner.os == 'macOS'
        working-directory: clients/streamserver-desktop
        shell: bash
        run: ./scripts/package_offline.sh macos

      - name: Build macOS DMG
        if: runner.os == 'macOS'
        working-directory: clients/streamserver-desktop
        shell: bash
        run: |
          version="$(awk '/^version:/ { print $2; exit }' pubspec.yaml | tr '+' '-')"
          stamp="$(date -u '+%Y%m%d-%H%M%S')"
          dmg="dist/streamserver-desktop-macos-${version}-${stamp}.dmg"
          hdiutil create \
            -volname "StreamServer控制台" \
            -srcfolder build/macos/Build/Products/Release/streamserver_desktop.app \
            -ov \
            -format UDZO \
            "${dmg}"
          shasum -a 256 "${dmg}" >> dist/SHA256SUMS

      - name: Build Linux offline package
        if: runner.os == 'Linux'
        working-directory: clients/streamserver-desktop
        shell: bash
        run: ./scripts/package_offline.sh linux

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: streamserver-desktop-${{ matrix.target }}-${{ matrix.arch }}
          path: clients/streamserver-desktop/dist/*
          if-no-files-found: error
          retention-days: 14

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release view "${tag}" >/dev/null 2>&1 \
            || gh release create "${tag}" --title "${tag}" --notes "Automated StreamServer release." \
            || true
          gh release upload "${tag}" clients/streamserver-desktop/dist/* --clobber
