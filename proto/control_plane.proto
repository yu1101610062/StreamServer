syntax = "proto3";

package streamserver.controlplane;

service ControlPlane {
  // Agent 建连后长期保持双向流：Agent 上报心跳/事件，Core 下发任务控制命令。
  rpc StreamConnect(stream AgentEnvelope) returns (stream CoreEnvelope);
}

message AgentEnvelope {
  // 第一条消息必须是 Register，后续消息按同一会话持续上报。
  oneof payload {
    Register register = 1;
    Heartbeat heartbeat = 2;
    CapabilitySnapshot capability_snapshot = 3;
    TaskEvent task_event = 4;
    TaskLogBatch task_log_batch = 5;
    TaskProgress task_progress = 6;
    TaskSnapshot task_snapshot = 7;
    CertificateRotationRequest certificate_rotation_request = 8;
    CertificateRotationActivated certificate_rotation_activated = 9;
    ZlmDebugResponse zlm_debug_response = 10;
    ZlmHookRequest zlm_hook_request = 11;
  }
}

message CoreEnvelope {
  // Core 到 Agent 的命令都走同一条流，避免为任务控制再建立额外连接。
  oneof payload {
    StartTask start_task = 1;
    StopTask stop_task = 2;
    ProbeCapabilities probe_capabilities = 3;
    AdoptOrphans adopt_orphans = 4;
    TaskRecordingControl task_recording_control = 5;
    CertificateRotationBundle certificate_rotation_bundle = 6;
    ActivateCertificateRotation activate_certificate_rotation = 7;
    ZlmDebugRequest zlm_debug_request = 8;
    CertificateRotationReset certificate_rotation_reset = 9;
    ZlmHookResponse zlm_hook_response = 10;
  }
}

message Register {
  // 节点注册字段参与调度和媒体地址外部化；管理目标只由认证 peer IP、证书 SAN 与 management_port 构造。
  string node_id = 1;
  string node_name = 2;
  string agent_version = 3;
  string hostname = 4;
  repeated string labels = 5;
  repeated string interfaces = 6;
  string zlm_api_base = 7 [deprecated = true];
  string zlm_api_secret = 8 [deprecated = true];
  string agent_stream_addr = 9;
  string network_mode = 10;
  string ffmpeg_bin = 11;
  string ffprobe_bin = 12;
  string zlm_server_id = 13;
  string output_mount_relative_prefix_mp4 = 14;
  string output_mount_relative_prefix_hls = 15;
  uint32 zlm_rtmp_port = 16;
  uint32 zlm_rtsp_port = 17;
  string agent_http_base_url = 18 [deprecated = true];
  uint32 management_port = 19;
  uint64 management_upload_max_bytes = 20;
}

// Agent-generated CSRs are bound to one idempotent rotation transaction. The
// authenticated stream supplies the node identity, so node_id is not repeated.
message CertificateRotationRequest {
  string rotation_id = 1;
  string control_csr_pem = 2;
  string management_csr_pem = 3;
}

// A staged bundle expires if it is not activated before expires_at_ms. The
// certificate metadata lets the Agent validate the response before persisting it.
message CertificateRotationBundle {
  string rotation_id = 1;
  int64 expires_at_ms = 2;
  string control_certificate_pem = 3;
  string control_fingerprint_sha256 = 4;
  string control_serial_number = 5;
  int64 control_not_before_ms = 6;
  int64 control_not_after_ms = 7;
  string management_certificate_pem = 8;
  string management_fingerprint_sha256 = 9;
  string management_serial_number = 10;
  int64 management_not_before_ms = 11;
  int64 management_not_after_ms = 12;
  string agent_client_issuer_ca_pem = 13;
  string control_plane_server_ca_pem = 14;
  string management_client_ca_pem = 15;
  string capability_jwt_public_key_pem = 16;
  string capability_jwt_kid = 17;
}

// The old and new identities overlap only until the supplied deadline.
message ActivateCertificateRotation {
  string rotation_id = 1;
  int64 previous_identity_expires_at_ms = 2;
}

// Presence of this message is the successful activation acknowledgement.
message CertificateRotationActivated {
  string rotation_id = 1;
  int64 activated_at_ms = 2;
  string control_fingerprint_sha256 = 3;
  string management_fingerprint_sha256 = 4;
}

enum CertificateRotationResetReason {
  CERTIFICATE_ROTATION_RESET_REASON_UNSPECIFIED = 0;
  CERTIFICATE_ROTATION_RESET_REASON_EXPIRED = 1;
}

// Core sends this only for an authenticated, exact rotation transaction whose
// staged bundle expired before activation. The Agent may discard only that
// pending transaction and immediately request a fresh rotation identifier.
message CertificateRotationReset {
  string rotation_id = 1;
  CertificateRotationResetReason reason = 2;
}

enum ZlmDebugOperation {
  ZLM_DEBUG_OPERATION_UNSPECIFIED = 0;
  ZLM_DEBUG_OPERATION_LIST_MEDIA = 1;
  ZLM_DEBUG_OPERATION_LIST_SESSIONS = 2;
  ZLM_DEBUG_OPERATION_LIST_PLAYERS = 3;
  ZLM_DEBUG_OPERATION_GET_STATISTIC = 4;
  ZLM_DEBUG_OPERATION_GET_THREADS_LOAD = 5;
  ZLM_DEBUG_OPERATION_GET_WORK_THREADS_LOAD = 6;
  ZLM_DEBUG_OPERATION_KICK_SESSION = 7;
  ZLM_DEBUG_OPERATION_KICK_SESSIONS = 8;
  ZLM_DEBUG_OPERATION_CLOSE_STREAM = 9;
  ZLM_DEBUG_OPERATION_SNAPSHOT = 10;
}

// The operation allowlist and typed parameter union prevent Core from sending
// an arbitrary ZLM API path, secret, or parameter map to an Agent.
message ZlmDebugRequest {
  string request_id = 1;
  ZlmDebugOperation operation = 2;
  oneof parameters {
    ZlmMediaFilter media_filter = 3;
    ZlmKickSessionParameters kick_session = 4;
    ZlmKickSessionsParameters kick_sessions = 5;
    ZlmCloseStreamParameters close_stream = 6;
    ZlmSnapshotParameters snapshot = 7;
  }
}

message ZlmMediaFilter {
  string schema = 1;
  string vhost = 2;
  string app = 3;
  string stream = 4;
}

message ZlmKickSessionParameters {
  string session_id = 1;
}

message ZlmKickSessionsParameters {
  uint32 local_port = 1;
  string peer_ip = 2;
}

message ZlmCloseStreamParameters {
  string schema = 1;
  string vhost = 2;
  string app = 3;
  string stream = 4;
  bool force = 5;
}

message ZlmSnapshotParameters {
  string source_url = 1;
  uint32 timeout_sec = 2;
  uint32 expire_sec = 3;
}

enum ZlmDebugResponseStatus {
  ZLM_DEBUG_RESPONSE_STATUS_UNSPECIFIED = 0;
  ZLM_DEBUG_RESPONSE_STATUS_SUCCEEDED = 1;
  ZLM_DEBUG_RESPONSE_STATUS_FAILED = 2;
}

// Implementations must enforce their configured response-size limit before
// constructing this message and set truncated when a JSON response is clipped.
message ZlmDebugResponse {
  string request_id = 1;
  ZlmDebugOperation operation = 2;
  ZlmDebugResponseStatus status = 3;
  oneof payload {
    string json_payload = 4;
    ZlmSnapshotPayload snapshot = 5;
    ZlmDebugError error = 6;
  }
  bool truncated = 7;
}

message ZlmSnapshotPayload {
  string content_type = 1;
  bytes data = 2;
}

message ZlmDebugError {
  string code = 1;
  string message = 2;
}

// ZLM hooks enter through the Agent's local listener. Core derives the media
// server identity from the authenticated control-stream session; neither a
// remote server identifier nor the ZLM API secret is part of this contract.
message ZlmHookRequest {
  string request_id = 1;
  string hook_name = 2;
  string body_json = 3;
}

message ZlmHookResponse {
  string request_id = 1;
  uint32 http_status = 2;
  string body_json = 3;
}

message Heartbeat {
  // 心跳同时携带运行负载与清理状态，Core 调度时会把两者一起作为节点可用性依据。
  int64 node_time_ms = 1;
  double cpu_percent = 2;
  double mem_percent = 3;
  double disk_percent = 4;
  uint32 running_tasks = 5;
  reserved 6;
  bool zlm_alive = 7;
  bool ffmpeg_alive = 8;
  repeated GpuRuntime gpu_runtime = 9;
  uint32 starting_tasks = 10;
  uint32 stopping_tasks = 11;
  uint32 orphaned_tasks = 12;
  bool artifact_cleanup_blocked = 13;
  string artifact_cleanup_block_reason = 14;
  uint64 upload_disk_total_bytes = 15;
  uint64 upload_disk_available_bytes = 16;
  double upload_disk_used_percent = 17;
  repeated RuntimeSlotLoad runtime_slot_loads = 18;
}

message CapabilitySnapshot {
  // 能力快照来自本机 FFmpeg/ZLM/GPU 探测，用于展示和后续调度策略判断。
  repeated string ffmpeg_protocols = 1;
  repeated string ffmpeg_formats = 2;
  repeated string ffmpeg_encoders = 3;
  repeated string ffmpeg_decoders = 4;
  string zlm_version = 5;
  repeated string zlm_api_list = 6;
  repeated string gpu = 7;
  repeated GpuDevice gpu_devices = 8;
}

message GpuDevice {
  uint32 index = 1;
  string uuid = 2;
  string name = 3;
  uint64 memory_total_mb = 4;
}

message GpuRuntime {
  uint32 index = 1;
  double gpu_util_percent = 2;
  uint64 memory_used_mb = 3;
  uint64 memory_total_mb = 4;
  double encoder_util_percent = 5;
  double decoder_util_percent = 6;
}

message RuntimeSlotLoad {
  string source_mode = 1;
  uint32 max_runtime_slots = 2;
  uint32 running_tasks = 3;
  uint32 starting_tasks = 4;
  uint32 stopping_tasks = 5;
  uint32 orphaned_tasks = 6;
  double slot_usage = 7;
}

message TaskEvent {
  string task_id = 1;
  int32 attempt_no = 2;
  string event_type = 3;
  string event_level = 4;
  string message = 5;
  string payload_json = 6;
  string lease_token = 7;
}

message TaskLogBatch {
  string task_id = 1;
  int32 attempt_no = 2;
  string stream = 3;
  repeated string lines = 4;
  string lease_token = 5;
}

message TaskProgress {
  string task_id = 1;
  int32 attempt_no = 2;
  uint64 frame = 3;
  double fps = 4;
  double bitrate_kbps = 5;
  double speed = 6;
  uint64 out_time_ms = 7;
  uint64 dup_frames = 8;
  uint64 drop_frames = 9;
  string lease_token = 10;
}

message TaskSnapshot {
  string runtime_id = 1;
  string task_id = 2;
  int32 attempt_no = 3;
  string worker_kind = 4;
  int32 pid = 5;
  string state = 6;
  string command_line = 7;
  repeated string outputs = 8;
  string metadata_json = 9;
  string lease_token = 10;
}

message StartTask {
  string task_id = 1;
  int32 attempt_no = 2;
  string task_type = 3;
  string resolved_spec_json = 4;
  string execution_mode = 5;
  string lease_token = 6;
  string trace_context = 7;
}

message StopTask {
  string task_id = 1;
  int32 attempt_no = 2;
  string reason = 3;
  uint32 grace_period_sec = 4;
  uint32 force_after_sec = 5;
  string lease_token = 6;
}

message TaskRecordingControl {
  string task_id = 1;
  int32 attempt_no = 2;
  string lease_token = 3;
  string action = 4;
  string record_config_json = 5;
  string reason = 6;
  string command_id = 7;
}

message ProbeCapabilities {}

message ReclaimRuntime {
  string task_id = 1;
  int32 attempt_no = 2;
  string lease_token = 3;
  string worker_kind = 4;
}

message AdoptOrphans {
  repeated ReclaimRuntime runtimes = 1;
}
