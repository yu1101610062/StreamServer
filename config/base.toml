[logging]
level = "info"
json = false

[core]
http_addr = "0.0.0.0:8080"
grpc_addr = "0.0.0.0:50051"
grpc_tls_cert_path = ""
grpc_tls_key_path = ""
grpc_tls_client_ca_path = ""
database_url = ""
auth_mode = "disabled"
jwt_public_key = ""
auth_jwt_private_key_path = ""
auth_jwt_public_key_path = ""
auth_access_token_ttl = "15m"
auth_refresh_token_ttl = "7d"
hook_shared_secret = ""
hook_source_allowlist = []
zlm_auto_close_on_no_reader_enabled = false
callback_timeout_ms = 5000
callback_max_attempts = 8
callback_initial_backoff_ms = 5000
callback_max_backoff_ms = 300000
callback_settle_delay_ms = 8000
callback_shared_secret = ""
storage_allowlist = ["/data/media/work", "/data/zlm/www"]
source_gateway_base_url = ""
source_gateway_prefetch_poll_ms = 1000
source_gateway_prefetch_timeout_ms = 600000

[agent]
http_addr = "0.0.0.0:8081"
node_id = ""
node_name = "local-agent"
core_endpoint = "http://127.0.0.1:50051"
cert_path = "certs/agent.pem"
key_path = "certs/agent.key"
ca_path = "certs/ca.pem"
tls_domain_name = ""
ffmpeg_bin = "ffmpeg"
ffprobe_bin = "ffprobe"
zlm_api_base = "http://127.0.0.1:8080"
zlm_api_secret = ""
zlm_auto_close_on_no_reader_enabled = false
mp4_record_segment_sec = 7200
hls_record_segment_sec = 60
agent_stream_addr = "http://127.0.0.1:8081"
output_mount_relative_prefix_mp4 = "output"
output_mount_relative_prefix_hls = "output"
network_mode = "bridge"
labels = []
max_live_runtime_slots = 0
max_vod_runtime_slots = 0
runtime_manager_start_limit = 8
runtime_manager_stop_limit = 16
runtime_manager_recording_limit = 12
runtime_manager_adopt_limit = 1
runtime_log_tail_bytes = 8192
runtime_log_max_file_bytes = 134217728
runtime_log_retention_days = 7
work_root = "/data/media/work"
upload_max_bytes = 10737418240
upload_allowed_extensions = ["mp4", "mov", "m4v", "mkv", "webm", "ts", "m2ts", "mts", "flv"]
upload_probe_timeout_sec = 30
public_media_base_url = ""

[agent.artifact_cleanup]
enabled = true
threshold_percent = 85
strategy = "delete_oldest_then_reject"
check_interval_sec = 30
