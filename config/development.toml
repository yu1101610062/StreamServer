[logging]
level = "debug"

[core]
hook_source_allowlist = ["127.0.0.1"]
storage_allowlist = ["./data/media/work", "./data/zlm/www"]

[agent]
work_root = "./data/media/work"

[agent.artifact_cleanup]
enabled = true
threshold_percent = 85
strategy = "delete_oldest_then_reject"
check_interval_sec = 30
