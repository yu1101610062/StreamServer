[api]
apiDebug=0
secret=streamserver-e2e-secret
snapRoot=/data/zlm/www/snap/
defaultSnap=/opt/media/bin/default.pem

[protocol]
modify_stamp=2
enable_audio=1
add_mute_audio=1
auto_close=0
continue_push_ms=15000
enable_hls=1
enable_hls_fmp4=0
enable_mp4=0
enable_rtsp=1
enable_rtmp=1
enable_ts=1
enable_fmp4=1
mp4_as_player=0
mp4_max_second=5
mp4_save_path=/data/zlm/record
hls_save_path=/data/zlm/www
hls_demand=0
rtsp_demand=0
rtmp_demand=0
ts_demand=0
fmp4_demand=0

[general]
enableVhost=0
maxStreamWaitMS=15000
streamNoneReaderDelayMS=5000
resetWhenRePlay=1
mediaServerId=11111111-1111-1111-1111-111111111111

[hls]
segDur=2
segNum=3
segRetain=5
broadcastRecordTs=1
segKeep=0

[hook]
enable=1
on_publish=http://media-core:8080/internal/hooks/zlm/11111111-1111-1111-1111-111111111111/on_publish?secret=streamserver-e2e-secret
on_record_mp4=http://media-core:8080/internal/hooks/zlm/11111111-1111-1111-1111-111111111111/on_record_mp4?secret=streamserver-e2e-secret
on_stream_none_reader=http://media-core:8080/internal/hooks/zlm/11111111-1111-1111-1111-111111111111/on_stream_none_reader?secret=streamserver-e2e-secret
on_stream_not_found=http://media-core:8080/internal/hooks/zlm/11111111-1111-1111-1111-111111111111/on_stream_not_found?secret=streamserver-e2e-secret
on_server_started=http://media-core:8080/internal/hooks/zlm/11111111-1111-1111-1111-111111111111/on_server_started?secret=streamserver-e2e-secret
on_server_keepalive=http://media-core:8080/internal/hooks/zlm/11111111-1111-1111-1111-111111111111/on_server_keepalive?secret=streamserver-e2e-secret
on_rtp_server_timeout=http://media-core:8080/internal/hooks/zlm/11111111-1111-1111-1111-111111111111/on_rtp_server_timeout?secret=streamserver-e2e-secret
timeoutSec=5
alive_interval=10.0
retry=1
retry_delay=1.0

[http]
port=80
rootPath=/data/zlm/www
allow_cross_domains=1
allow_ip_range=::1,127.0.0.1,172.28.0.10,172.28.0.20,172.28.0.30

[record]
appName=record

[rtmp]
port=1935

[rtsp]
port=554
