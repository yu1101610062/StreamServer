version: "2.4"

services:
  postgres:
    image: ${POSTGRES_IMAGE}
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - ./data/postgres:/var/lib/postgresql

  media-core:
    image: ${MEDIA_CORE_IMAGE}
    restart: unless-stopped
    network_mode: host
    entrypoint: ["/opt/streamserver/bin/media-core"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      STREAMSERVER_ENV: production
      STREAMSERVER_UI_DIR: /opt/streamserver/ui
      CORE_HTTP_ADDR: 0.0.0.0:${CORE_HTTP_PORT}
      CORE_GRPC_ADDR: 0.0.0.0:${CORE_GRPC_PORT}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:5432/${POSTGRES_DB}
      HOOK_SHARED_SECRET: ${HOOK_SHARED_SECRET}
      HOOK_SOURCE_ALLOWLIST: ${HOOK_SOURCE_ALLOWLIST}
      STORAGE_ALLOWLIST: ${STORAGE_ALLOWLIST}
      AUTH_MODE: ${AUTH_MODE}
      AUTH_ENABLED: ${AUTH_ENABLED}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      AUTH_JWT_PRIVATE_KEY_PATH: ${AUTH_JWT_PRIVATE_KEY_PATH}
      AUTH_JWT_PUBLIC_KEY_PATH: ${AUTH_JWT_PUBLIC_KEY_PATH}
      AUTH_ACCESS_TOKEN_TTL: ${AUTH_ACCESS_TOKEN_TTL}
      AUTH_REFRESH_TOKEN_TTL: ${AUTH_REFRESH_TOKEN_TTL}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${CORE_HTTP_PORT}/health/ready >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - ./bin:/opt/streamserver/bin:ro
      - ./ui:/opt/streamserver/ui:ro
      - ./certs:/certs:ro

  zlmediakit:
    image: ${ZLM_IMAGE}
    restart: unless-stopped
    network_mode: host
    depends_on:
      media-core:
        condition: service_healthy
    command: ["./MediaServer", "-s", "default.pem", "-c", "../conf/config.ini", "-l", "0"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS 'http://127.0.0.1:${ZLM_HTTP_PORT}/index/api/getStatistic?secret=${HOOK_SHARED_SECRET}' >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - ./data/media/work:/data/media/work
      - ./data/zlm/www:/data/zlm/www
      - ./zlm/config.ini:/opt/media/conf/config.ini:ro

  media-agent:
    image: ${MEDIA_AGENT_IMAGE}
    restart: unless-stopped
    network_mode: host
    entrypoint: ["/opt/streamserver/bin/media-agent"]
    depends_on:
      media-core:
        condition: service_healthy
      zlmediakit:
        condition: service_healthy
    environment:
      STREAMSERVER_ENV: production
      AGENT_HTTP_ADDR: 0.0.0.0:${AGENT_HTTP_PORT}
      AGENT_NODE_ID: ${NODE_ID}
      AGENT_NODE_NAME: ${AGENT_NODE_NAME}
      AGENT_CORE_ENDPOINT: http://127.0.0.1:${CORE_GRPC_PORT}
      AGENT_STREAM_ADDR: http://${PUBLIC_HOST}
      AGENT_PRIMARY_INTERFACE_NAME: ${AGENT_PRIMARY_INTERFACE_NAME}
      AGENT_PRIMARY_INTERFACE_IP: ${AGENT_PRIMARY_INTERFACE_IP}
      OUTPUT_MOUNT_RELATIVE_PREFIX_MP4: ${OUTPUT_MOUNT_RELATIVE_PREFIX_MP4}
      OUTPUT_MOUNT_RELATIVE_PREFIX_HLS: ${OUTPUT_MOUNT_RELATIVE_PREFIX_HLS}
      AGENT_MULTICAST_INTERFACE_NAME: ${AGENT_MULTICAST_INTERFACE_NAME}
      AGENT_MULTICAST_INTERFACE_IP: ${AGENT_MULTICAST_INTERFACE_IP}
      AGENT_NETWORK_MODE: host
      AGENT_ACCELERATION_MODE: ${AGENT_ACCELERATION_MODE}
      AGENT_LABELS: ${AGENT_LABELS}
      AGENT_MAX_RUNTIME_SLOTS: ${AGENT_MAX_RUNTIME_SLOTS}
      AGENT_ARTIFACT_CLEANUP_ENABLED: ${AGENT_ARTIFACT_CLEANUP_ENABLED}
      AGENT_ARTIFACT_CLEANUP_THRESHOLD_PERCENT: ${AGENT_ARTIFACT_CLEANUP_THRESHOLD_PERCENT}
      AGENT_ARTIFACT_CLEANUP_STRATEGY: ${AGENT_ARTIFACT_CLEANUP_STRATEGY}
      AGENT_ARTIFACT_CLEANUP_CHECK_INTERVAL_SEC: ${AGENT_ARTIFACT_CLEANUP_CHECK_INTERVAL_SEC}
      WORK_ROOT: /data/media/work
      FFMPEG_BIN: ffmpeg
      FFPROBE_BIN: ffprobe
      ZLM_API_BASE: http://${ZLM_API_HOST}:${ZLM_HTTP_PORT}
      ZLM_RTMP_PORT: ${ZLM_RTMP_PORT}
      ZLM_RTSP_PORT: ${ZLM_RTSP_PORT}
      ZLM_API_SECRET: ${HOOK_SHARED_SECRET}
      ZLM_AUTO_CLOSE_ON_NO_READER_ENABLED: "true"
      AGENT_ALLOW_ENHANCED_RTMP_EXPOSE: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${AGENT_HTTP_PORT}/health/ready >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - ./bin:/opt/streamserver/bin:ro
      - ./data/media/work:/data/media/work
      - ./data/media/logs:/data/media/logs
      - ./data/zlm/www:/data/zlm/www
      - ./certs:/certs:ro
