services:
  postgres:
    image: ${POSTGRES_IMAGE}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      streamserver-stack:
        ipv4_address: ${POSTGRES_IP}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  media-core:
    image: ${MEDIA_CORE_IMAGE}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      STREAMSERVER_ENV: production
      CORE_HTTP_ADDR: 0.0.0.0:8080
      CORE_GRPC_ADDR: 0.0.0.0:50051
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      HOOK_SHARED_SECRET: ${HOOK_SHARED_SECRET}
      HOOK_SOURCE_ALLOWLIST: ${HOOK_SOURCE_ALLOWLIST}
      STORAGE_ALLOWLIST: ${STORAGE_ALLOWLIST}
      AUTH_ENABLED: ${AUTH_ENABLED}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health/ready >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - ./certs:/certs:ro
    networks:
      streamserver-stack:
        ipv4_address: ${CORE_IP}
    ports:
      - "${CORE_HTTP_PORT}:8080"
      - "${CORE_GRPC_PORT}:50051"

  zlmediakit:
    image: ${ZLM_IMAGE}
    restart: unless-stopped
    network_mode: host
    depends_on:
      media-core:
        condition: service_healthy
    command: ["./MediaServer", "-s", "default.pem", "-c", "../conf/config.ini", "-l", "0"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS 'http://127.0.0.1:${ZLM_HTTP_PORT}/index/api/getStatistic?secret=${HOOK_SHARED_SECRET}' >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - ./data/media/work:/data/media/work
      - ./data/zlm/record:/data/zlm/record
      - ./data/zlm/www:/data/zlm/www
      - ./zlm/config.ini:/opt/media/conf/config.ini:ro

  media-agent:
    image: ${MEDIA_AGENT_IMAGE}
    restart: unless-stopped
    network_mode: host
    depends_on:
      media-core:
        condition: service_healthy
      zlmediakit:
        condition: service_healthy
    environment:
      STREAMSERVER_ENV: production
      AGENT_HTTP_ADDR: 0.0.0.0:${AGENT_HTTP_PORT}
      AGENT_NODE_ID: ${NODE_ID}
      AGENT_NODE_NAME: ${AGENT_NODE_NAME}
      AGENT_CORE_ENDPOINT: http://127.0.0.1:${CORE_GRPC_PORT}
      AGENT_STREAM_ADDR: http://${PUBLIC_HOST}
      AGENT_NETWORK_MODE: host
      AGENT_LABELS: ${AGENT_LABELS}
      WORK_ROOT: /data/media/work
      FFMPEG_BIN: ffmpeg
      FFPROBE_BIN: ffprobe
      ZLM_API_BASE: http://127.0.0.1:${ZLM_HTTP_PORT}
      ZLM_API_SECRET: ${HOOK_SHARED_SECRET}
      ZLM_AUTO_CLOSE_ON_NO_READER_ENABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${AGENT_HTTP_PORT}/health/ready >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - ./data/media/work:/data/media/work
      - ./data/media/logs:/data/media/logs
      - ./certs:/certs:ro

networks:
  streamserver-stack:
    driver: bridge
    ipam:
      config:
        - subnet: ${STACK_SUBNET}
