version: "2.4"

services:
  zlmediakit:
    image: ${ZLM_IMAGE}
    restart: unless-stopped
    command: ["./MediaServer", "-s", "default.pem", "-c", "../conf/config.ini", "-l", "0"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS 'http://127.0.0.1:80/index/api/getStatistic?secret=${HOOK_SHARED_SECRET}' >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      streamserver-worker:
        ipv4_address: ${ZLM_IP}
    ports:
      - "${ZLM_HTTP_PORT}:80"
      - "${ZLM_RTMP_PORT}:1935"
      - "${ZLM_RTSP_PORT}:554"
    volumes:
      - ./data/media/work:/data/media/work
      - ./data/zlm/record:/data/zlm/record
      - ./data/zlm/www:/data/zlm/www
      - ./zlm/config.ini:/opt/media/conf/config.ini:ro

  media-agent:
    image: ${MEDIA_AGENT_IMAGE}
    restart: unless-stopped
    depends_on:
      zlmediakit:
        condition: service_healthy
    environment:
      STREAMSERVER_ENV: production
      AGENT_HTTP_ADDR: 0.0.0.0:8081
      AGENT_NODE_ID: ${NODE_ID}
      AGENT_NODE_NAME: ${AGENT_NODE_NAME}
      AGENT_CORE_ENDPOINT: http://${CORE_GRPC_HOST}:${CORE_GRPC_PORT}
      AGENT_STREAM_ADDR: http://${PUBLIC_HOST}
      AGENT_NETWORK_MODE: ${AGENT_NETWORK_MODE}
      AGENT_LABELS: ${AGENT_LABELS}
      WORK_ROOT: ${WORK_ROOT}
      FFMPEG_BIN: ffmpeg
      FFPROBE_BIN: ffprobe
      ZLM_API_BASE: http://zlmediakit:80
      ZLM_API_SECRET: ${HOOK_SHARED_SECRET}
      ZLM_AUTO_CLOSE_ON_NO_READER_ENABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8081/health/ready >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      streamserver-worker:
        ipv4_address: ${AGENT_IP}
    ports:
      - "${AGENT_HTTP_PORT}:8081"
    volumes:
      - ./data/media/work:/data/media/work
      - ./data/media/logs:/data/media/logs
      - ./certs:/certs:ro

networks:
  streamserver-worker:
    driver: bridge
    ipam:
      config:
        - subnet: ${STACK_SUBNET}
