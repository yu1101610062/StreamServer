version: "2.4"

services:
  postgres:
    image: ${POSTGRES_IMAGE}
    restart: unless-stopped
    network_mode: host
    command: ["postgres", "-p", "${POSTGRES_PORT}"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p ${POSTGRES_PORT} -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - ./data/postgres:/var/lib/postgresql

  media-core:
    image: ${MEDIA_CORE_IMAGE}
    restart: unless-stopped
    network_mode: host
    entrypoint: ["/opt/streamserver/bin/media-core"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      STREAMSERVER_ENV: production
      STREAMSERVER_UI_DIR: /opt/streamserver/ui
      CORE_HTTP_ADDR: 0.0.0.0:${CORE_HTTP_PORT}
      CORE_GRPC_ADDR: 0.0.0.0:${CORE_GRPC_PORT}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:${POSTGRES_PORT}/${POSTGRES_DB}
      HOOK_SHARED_SECRET: ${HOOK_SHARED_SECRET}
      HOOK_SOURCE_ALLOWLIST: ${HOOK_SOURCE_ALLOWLIST}
      STORAGE_ALLOWLIST: ${STORAGE_ALLOWLIST}
      AUTH_MODE: ${AUTH_MODE}
      AUTH_ENABLED: ${AUTH_ENABLED}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      AUTH_JWT_PRIVATE_KEY_PATH: ${AUTH_JWT_PRIVATE_KEY_PATH}
      AUTH_JWT_PUBLIC_KEY_PATH: ${AUTH_JWT_PUBLIC_KEY_PATH}
      AUTH_ACCESS_TOKEN_TTL: ${AUTH_ACCESS_TOKEN_TTL}
      AUTH_REFRESH_TOKEN_TTL: ${AUTH_REFRESH_TOKEN_TTL}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${CORE_HTTP_PORT}/health/ready >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - ./bin:/opt/streamserver/bin:ro
      - ./ui:/opt/streamserver/ui:ro
      - ./certs:/certs:ro

  zlmediakit:
    image: ${ZLM_IMAGE}
    restart: unless-stopped
    network_mode: host
    depends_on:
      media-core:
        condition: service_healthy
    command:
      - /bin/sh
      - -ec
      - /opt/media/conf/render-config.sh /opt/media/conf/config.ini.template /tmp/streamserver-zlm-config.ini && exec ./MediaServer -s default.pem -c /tmp/streamserver-zlm-config.ini -l 0
    environment:
      ZLM_API_SECRET: ${HOOK_SHARED_SECRET}
      ZLM_HOOK_SHARED_SECRET: ${HOOK_SHARED_SECRET}
      ZLM_SERVER_ID: ${NODE_ID}
      ZLM_HOOK_BASE: http://127.0.0.1:${CORE_HTTP_PORT}/internal/hooks/zlm/${NODE_ID}
      ZLM_API_ALLOW_IP_RANGE: ::1,127.0.0.1,10.0.0.0-10.255.255.255,172.16.0.0-172.31.255.255,192.168.0.0-192.168.255.255
      ZLM_HTTP_PORT: ${ZLM_HTTP_PORT}
      ZLM_HTTPS_PORT: ${ZLM_HTTPS_PORT}
      ZLM_RTMP_PORT: ${ZLM_RTMP_PORT}
      ZLM_RTMPS_PORT: ${ZLM_RTMPS_PORT}
      ZLM_RTSP_PORT: ${ZLM_RTSP_PORT}
      ZLM_RTSPS_PORT: ${ZLM_RTSPS_PORT}
      ZLM_RTP_PROXY_PORT: ${ZLM_RTP_PROXY_PORT}
      ZLM_RTP_PROXY_PORT_RANGE: ${ZLM_RTP_PROXY_PORT_RANGE}
      ZLM_RTC_SIGNALING_PORT: ${ZLM_RTC_SIGNALING_PORT}
      ZLM_RTC_SIGNALING_SSL_PORT: ${ZLM_RTC_SIGNALING_SSL_PORT}
      ZLM_RTC_ICE_PORT: ${ZLM_RTC_ICE_PORT}
      ZLM_RTC_ICE_TCP_PORT: ${ZLM_RTC_ICE_TCP_PORT}
      ZLM_RTC_PORT: ${ZLM_RTC_PORT}
      ZLM_RTC_TCP_PORT: ${ZLM_RTC_TCP_PORT}
      ZLM_RTC_PORT_RANGE: ${ZLM_RTC_PORT_RANGE}
      ZLM_SRT_PORT: ${ZLM_SRT_PORT}
      ZLM_SHELL_PORT: ${ZLM_SHELL_PORT}
      ZLM_ONVIF_PORT: ${ZLM_ONVIF_PORT}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS 'http://127.0.0.1:${ZLM_HTTP_PORT}/index/api/getStatistic?secret=${HOOK_SHARED_SECRET}' >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - ./data/media/work:/data/media/work
      - ${ZLM_WWW_MOUNT_HOST_DIR}:/data/zlm/www
      - ${ZLM_OUTPUT_MOUNT_HOST_DIR}:/data/zlm/www/output
      - ./zlm/config.ini.template:/opt/media/conf/config.ini.template:ro
      - ./zlm/render-config.sh:/opt/media/conf/render-config.sh:ro

  media-agent:
    image: ${MEDIA_AGENT_IMAGE}
    restart: unless-stopped
    network_mode: host
    runtime: nvidia
    entrypoint: ["/opt/streamserver/bin/media-agent"]
    depends_on:
      media-core:
        condition: service_healthy
      zlmediakit:
        condition: service_healthy
    environment:
      STREAMSERVER_ENV: production
      AGENT_HTTP_ADDR: 0.0.0.0:${AGENT_HTTP_PORT}
      AGENT_NODE_ID: ${NODE_ID}
      AGENT_NODE_NAME: ${AGENT_NODE_NAME}
      AGENT_CORE_ENDPOINT: http://127.0.0.1:${CORE_GRPC_PORT}
      AGENT_STREAM_ADDR: http://${PUBLIC_HOST}:${ZLM_HTTP_PORT}
      AGENT_PRIMARY_INTERFACE_NAME: ${AGENT_PRIMARY_INTERFACE_NAME}
      AGENT_PRIMARY_INTERFACE_IP: ${AGENT_PRIMARY_INTERFACE_IP}
      OUTPUT_MOUNT_RELATIVE_PREFIX_MP4: output
      OUTPUT_MOUNT_RELATIVE_PREFIX_HLS: output
      AGENT_MULTICAST_INTERFACE_NAME: ${AGENT_MULTICAST_INTERFACE_NAME}
      AGENT_MULTICAST_INTERFACE_IP: ${AGENT_MULTICAST_INTERFACE_IP}
      AGENT_NETWORK_MODE: host
      AGENT_ACCELERATION_MODE: ${AGENT_ACCELERATION_MODE}
      AGENT_LABELS: ${AGENT_LABELS}
      AGENT_MAX_RUNTIME_SLOTS: ${AGENT_MAX_RUNTIME_SLOTS}
      AGENT_HLS_RECORD_SEGMENT_SEC: ${AGENT_HLS_RECORD_SEGMENT_SEC}
      AGENT_ARTIFACT_CLEANUP_ENABLED: ${AGENT_ARTIFACT_CLEANUP_ENABLED}
      AGENT_ARTIFACT_CLEANUP_THRESHOLD_PERCENT: ${AGENT_ARTIFACT_CLEANUP_THRESHOLD_PERCENT}
      AGENT_ARTIFACT_CLEANUP_STRATEGY: ${AGENT_ARTIFACT_CLEANUP_STRATEGY}
      AGENT_ARTIFACT_CLEANUP_CHECK_INTERVAL_SEC: ${AGENT_ARTIFACT_CLEANUP_CHECK_INTERVAL_SEC}
      WORK_ROOT: ${WORK_ROOT}
      FFMPEG_BIN: ffmpeg
      FFPROBE_BIN: ffprobe
      ZLM_API_BASE: http://${ZLM_API_HOST}:${ZLM_HTTP_PORT}
      ZLM_RTMP_PORT: ${ZLM_RTMP_PORT}
      ZLM_RTSP_PORT: ${ZLM_RTSP_PORT}
      ZLM_API_SECRET: ${HOOK_SHARED_SECRET}
      ZLM_AUTO_CLOSE_ON_NO_READER_ENABLED: "true"
      AGENT_ALLOW_ENHANCED_RTMP_EXPOSE: "true"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,video
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${AGENT_HTTP_PORT}/health/ready >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - ./bin:/opt/streamserver/bin:ro
      - ./data/media/work:/data/media/work
      - ./data/media/logs:/data/media/logs
      - ${ZLM_WWW_MOUNT_HOST_DIR}:/data/zlm/www
      - ${ZLM_OUTPUT_MOUNT_HOST_DIR}:/data/zlm/www/output
      - ./certs:/certs:ro
