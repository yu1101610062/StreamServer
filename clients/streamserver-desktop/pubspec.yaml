name: streamserver_desktop
description: StreamServer Flutter desktop client backed by a Rust native module.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.3
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  path_provider: ^2.1.5
  file_selector: ^1.1.0
  go_router: ^17.3.0
  flutter_riverpod: ^3.3.2
  pluto_grid: ^8.1.0
  fl_chart: ^1.2.0
  window_manager: ^0.5.1
  lucide_icons_flutter: ^3.1.14+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
